name: Release

# Pushing a version tag (v0.2.0, …) builds the Windows binaries, packages the
# NSIS installer + portable zip, and publishes them as a GitHub release. The
# tag must match the version in res\resource.rc (which also feeds the
# installer), so a mismatched bump fails fast instead of shipping wrong
# metadata.

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: windows-latest
    env:
      LINEY_SIGNING_CERT_BASE64: ${{ secrets.LINEY_SIGNING_CERT_BASE64 }}
      LINEY_SIGNING_CERT_PASSWORD: ${{ secrets.LINEY_SIGNING_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Check the tag matches res/resource.rc
        shell: pwsh
        run: |
          $rc = Get-Content res\resource.rc -Raw
          if ($rc -notmatch 'FILEVERSION\s+(\d+),(\d+),(\d+)') {
            throw 'FILEVERSION not found in res\resource.rc'
          }
          $ver = "$($matches[1]).$($matches[2]).$($matches[3])"
          $tag = '${{ github.ref_name }}'.TrimStart('v')
          if ($ver -ne $tag) {
            throw "Tag v$tag != resource.rc version $ver. Bump res\resource.rc, src\app\WindowInternal.h and packaging manifests first."
          }

      - name: Detect optional Authenticode credentials
        id: signing
        shell: pwsh
        run: |
          $hasCert = -not [string]::IsNullOrWhiteSpace($env:LINEY_SIGNING_CERT_BASE64)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:LINEY_SIGNING_CERT_PASSWORD)
          if ($hasCert -ne $hasPassword) {
            throw 'Incomplete signing configuration: configure both Authenticode secrets or neither.'
          }
          "enabled=$($hasCert.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if (-not $hasCert) {
            Write-Warning 'Publishing an unsigned release. Windows SmartScreen may warn users.'
          }

      - name: Ensure NSIS
        shell: pwsh
        run: |
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue) -and
              -not (Test-Path "$env:ProgramFiles\NSIS\makensis.exe") -and
              -not (Test-Path "${env:ProgramFiles(x86)}\NSIS\makensis.exe")) {
            choco install nsis -y --no-progress
          }

      - name: Build release binaries
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools\build.ps1

      - name: Sign application binaries
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $cert = Join-Path $env:RUNNER_TEMP 'liney-signing.pfx'
          [IO.File]::WriteAllBytes($cert, [Convert]::FromBase64String($env:LINEY_SIGNING_CERT_BASE64))
          $signtool = (Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { throw 'signtool.exe not found' }
          $liney = Get-ChildItem build-ghostty -Recurse -Filter Liney.exe | Select-Object -First 1
          if (-not $liney) { throw 'Liney.exe not found after build' }
          $ghostty = Join-Path $liney.DirectoryName 'ghostty-vt.dll'
          foreach ($binary in @($liney.FullName, $ghostty)) {
            & $signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $cert /p $env:LINEY_SIGNING_CERT_PASSWORD $binary
            if ($LASTEXITCODE -ne 0) { throw "Authenticode signing failed: $binary" }
            & $signtool verify /pa /all $binary
            if ($LASTEXITCODE -ne 0) { throw "Authenticode verification failed: $binary" }
          }

      - name: Build installer + portable zip
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools\make-installer.ps1

      - name: Smoke test packaged binary
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools\smoke-test.ps1 -Exe build-ghostty\Liney.exe

      - name: Download previous stable installer for upgrade test
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $previous = gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName'
          if (-not $previous) { throw 'No previous stable release found' }
          New-Item -ItemType Directory -Force previous-release | Out-Null
          gh release download $previous --pattern liney-setup.exe --dir previous-release

      - name: Installer, portable, and uninstall smoke test
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools\installer-smoke.ps1 -Installer dist\liney-setup.exe -PreviousInstaller previous-release\liney-setup.exe -PortableZip dist\liney-portable.zip -ScratchRoot $env:RUNNER_TEMP\liney-package-smoke

      - name: Sign installer
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $cert = Join-Path $env:RUNNER_TEMP 'liney-signing.pfx'
          if (-not (Test-Path $cert)) {
            [IO.File]::WriteAllBytes($cert, [Convert]::FromBase64String($env:LINEY_SIGNING_CERT_BASE64))
          }
          $signtool = (Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { throw 'signtool.exe not found' }
          & $signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $cert /p $env:LINEY_SIGNING_CERT_PASSWORD dist\liney-setup.exe
          if ($LASTEXITCODE -ne 0) { throw 'Authenticode signing failed' }
          & $signtool verify /pa /all dist\liney-setup.exe
          if ($LASTEXITCODE -ne 0) { throw 'Authenticode verification failed' }
          Remove-Item -LiteralPath $cert -Force

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          Get-FileHash dist\liney-setup.exe, dist\liney-portable.zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -Encoding ascii dist\SHA256SUMS.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/liney-win.spdx.json

      - name: Generate release security notice
        shell: pwsh
        run: |
          $lines = @(
            'See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for the full list of changes.',
            ''
          )
          if ('${{ steps.signing.outputs.enabled }}' -eq 'true') {
            $lines += @(
              '> [!NOTE]',
              '> This release is Authenticode-signed. SHA-256 checksums and an SPDX SBOM are attached.',
              ''
            )
          } else {
            $lines += @(
              '> [!WARNING]',
              '> **This release is not code-signed.** Windows SmartScreen may display an `Unknown publisher` warning. Download only from this official repository and verify the attached `SHA256SUMS.txt` before running the installer.',
              ''
            )
          }
          $lines += @(
            '| File | Description |',
            '|---|---|',
            '| `liney-setup.exe` | Per-user installer, Start Menu shortcut and uninstaller |',
            '| `liney-portable.zip` | Portable archive; unzip and run `Liney.exe` |',
            '| `SHA256SUMS.txt` | SHA-256 checksums for downloadable artifacts |',
            '| `liney-win.spdx.json` | SPDX software bill of materials |'
          )
          $lines | Set-Content -Encoding utf8 release-body.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: liney-win ${{ github.ref_name }}
          body_path: release-body.md
          generate_release_notes: true
          files: |
            dist/liney-setup.exe
            dist/liney-portable.zip
            dist/SHA256SUMS.txt
            dist/liney-win.spdx.json
