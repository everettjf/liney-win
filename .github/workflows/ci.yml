name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Fast, reliable gate: the platform-independent logic (ModeScanner, Json).
  # Runs on Linux so it can't be blocked by the Windows toolchain.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure + build tests
        run: cmake -S tests -B build-tests -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build-tests
      - name: Run
        run: ctest --test-dir build-tests --output-on-failure

  # Full Windows build (MSVC + Zig + libghostty-vt). This is the integration
  # check that catches compile breaks in the Win32 / Direct2D / ConPTY code,
  # which the unit tests can't reach. Heavier (fetches + builds Ghostty).
  windows-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Set up Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools\build.ps1
      - name: Clean-machine load smoke test
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools\smoke-test.ps1 -Exe build-ghostty\Liney.exe
      - name: Startup regression budget
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools\perf-smoke.ps1 -Exe build-ghostty\Liney.exe
      - name: ConPTY and VT lifecycle soak
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools\soak-smoke.ps1 -Exe build-ghostty\Liney.exe -Iterations 50
      - name: Large-output, cancellation, and network-path stability soak
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools\stability-soak.ps1 -Exe build-ghostty\Liney.exe -DurationSeconds 30
      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-diagnostics-${{ matrix.os }}
          path: |
            build-ghostty/CMakeFiles/CMakeConfigureLog.yaml
            build-ghostty/**/*.log
          if-no-files-found: ignore
